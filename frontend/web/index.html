<!DOCTYPE html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Berrima Diesel Touring Tools - Diesel Price Tracker & 4WD, Caravan & Motorhome Route Planner for 4WD, Motorhome & Camper Travellers. The Diesel Experts since 1956." />
    <meta name="theme-color" content="#6B4423" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Berrima Diesel" />

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.openstreetmap.org https://*.tile.openstreetmap.org https://www.berrimadiesel.com; script-src 'self' 'unsafe-inline'; connect-src 'self' https://api.onegov.nsw.gov.au https://api.allorigins.win https://www.data.qld.gov.au https://www.fuelcheck.tas.gov.au https://nominatim.openstreetmap.org https://api.open-meteo.com https://www.rfs.nsw.gov.au https://overpass-api.de https://router.hereapi.com; frame-src 'none'; object-src 'none'; base-uri 'self';" />

    <!-- DNS prefetch for external APIs -->
    <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org">
    <link rel="dns-prefetch" href="https://api.open-meteo.com">
    <link rel="dns-prefetch" href="https://overpass-api.de">
    <link rel="dns-prefetch" href="https://router.hereapi.com">
    <link rel="dns-prefetch" href="https://unpkg.com">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <title>Berrima Diesel - Touring Tools</title>

    <!-- GitHub Pages SPA redirect handler — picks up route from 404.html redirect -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body class="bg-brand-light">
    <noscript>
      <div style="padding: 2rem; text-align: center; font-family: system-ui, sans-serif;">
        <h1 style="color: #6B4423; font-size: 1.5rem; margin-bottom: 1rem;">JavaScript Required</h1>
        <p>Berrima Diesel Touring Tools requires JavaScript to function. Please enable JavaScript in your browser settings to use this app.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
